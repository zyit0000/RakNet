name: Build GhostWatcher Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Compile GhostWatcher
      run: |
        # Compile for Intel x64 (Roblox on Mac runs via Rosetta or native Intel)
        clang++ -std=c++17 -Wall -arch x86_64 -o GhostWatcher watcher.cpp
        
    - name: Create Entitlements File
      run: |
        cat <<EOF > entitlements.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>com.apple.security.get-task-allow</key>
            <true/>
        </dict>
        </plist>
        EOF

    - name: Ad-Hoc Sign Executable
      run: |
        # This allows the binary to use task_for_pid on your Mac
        codesign --entitlements entitlements.plist --force -s - GhostWatcher

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GhostWatcher-Binary
        path: GhostWatcher

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: GhostWatcher
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
